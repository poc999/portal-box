// ---------------------------------------------------------------------------
// builders shared by the two portal worlds
// ---------------------------------------------------------------------------
function gradientDome(topHex, botHex, r = 300) {
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false,
    uniforms: { uTop:{value:new THREE.Color(topHex)}, uBot:{value:new THREE.Color(botHex)} },
    vertexShader: `varying vec3 vD; void main(){ vD=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `varying vec3 vD; uniform vec3 uTop,uBot;
      void main(){ float h=clamp(vD.y*0.5+0.5,0.0,1.0); vec3 c=mix(uBot,uTop,pow(h,0.75));
        float band=smoothstep(0.35,0.0,abs(vD.y)); c+=uBot*band*0.15; gl_FragColor=vec4(c,1.0);} `,
  });
  return new THREE.Mesh(new THREE.SphereGeometry(r, 32, 20), mat);
}

// ----- DESERT (ground at y=0 so it lines up with the player's floor) -----
function buildDesert() {
  const s = new THREE.Scene();
  s.fog = new THREE.FogExp2(0xdca86a, 0.013);
  s.add(gradientDome(0xffe4b0, 0xe09a5a));

  const g = new THREE.PlaneGeometry(700, 700, 100, 100);
  const p = g.attributes.position;
  for (let i=0;i<p.count;i++){ const x=p.getX(i), y=p.getY(i);
    p.setZ(i, Math.sin(x*0.06)*1.2 + Math.cos(y*0.05)*1.0 + Math.sin((x+y)*0.02)*2.2); }
  g.computeVertexNormals();
  const ground = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color:0xe8b878, roughness:1 }));
  ground.rotation.x = -Math.PI/2; s.add(ground);

  const sun = new THREE.Mesh(new THREE.SphereGeometry(7,24,24), new THREE.MeshBasicMaterial({color:0xfff2c8}));
  sun.position.set(-30, 16, -120); s.add(sun);
  const halo = new THREE.Mesh(new THREE.SphereGeometry(22,24,24), new THREE.MeshBasicMaterial({color:0xffd98a, transparent:true, opacity:0.28, blending:THREE.AdditiveBlending}));
  halo.position.copy(sun.position); s.add(halo);

  const cMat = new THREE.MeshStandardMaterial({ color:0x3f7a4a, roughness:0.9 });
  function cactus(){ const grp=new THREE.Group();
    const t=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,5,10),cMat); t.position.y=2.5; grp.add(t);
    for(const d of [1,-1]){ if(Math.random()<0.35) continue;
      const a=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,2.2,8),cMat); a.position.set(d*0.8,3.0,0); a.rotation.z=d*0.9; grp.add(a);
      const u=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.32,1.6,8),cMat); u.position.set(d*1.35,4.0,0); grp.add(u);} return grp; }
  for(let i=0;i<10;i++){ const c=cactus(); const a=Math.random()*Math.PI*2, r=14+Math.random()*70;
    c.position.set(Math.cos(a)*r,0,Math.sin(a)*r); c.scale.setScalar(0.7+Math.random()*1.1); s.add(c); }
  const rMat=new THREE.MeshStandardMaterial({color:0xb98a55,roughness:1});
  for(let i=0;i<8;i++){ const rk=new THREE.Mesh(new THREE.DodecahedronGeometry(1.2+Math.random()*2),rMat);
    const a=Math.random()*Math.PI*2, r=16+Math.random()*80; rk.position.set(Math.cos(a)*r,0.4,Math.sin(a)*r);
    rk.rotation.set(Math.random(),Math.random(),Math.random()); s.add(rk); }

  s.add(new THREE.HemisphereLight(0xffe0b0, 0xb87840, 1.2));
  const dl=new THREE.DirectionalLight(0xffe9c0,1.6); dl.position.copy(sun.position); s.add(dl);
  return s;
}

// ----- FOREST -----
function buildForest() {
  const s = new THREE.Scene();
  s.fog = new THREE.FogExp2(0x2a5947, 0.04);
  s.add(gradientDome(0xbfe6cf, 0x244d3d));

  const ground = new THREE.Mesh(new THREE.PlaneGeometry(700,700),
    new THREE.MeshStandardMaterial({ color:0x2f5638, roughness:1 }));
  ground.rotation.x=-Math.PI/2; s.add(ground);

  const trunkMat=new THREE.MeshStandardMaterial({color:0x4a331f,roughness:1});
  const leafMats=[0x2e6b3e,0x357a45,0x266035].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:0.95}));
  function pine(){ const grp=new THREE.Group(); const h=5+Math.random()*4;
    const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.4,h*0.5,8),trunkMat); tr.position.y=h*0.25; grp.add(tr);
    const lm=leafMats[(Math.random()*leafMats.length)|0]; let y=h*0.35;
    for(let k=0;k<3;k++){ const rad=2.2-k*0.55, ch=2.4-k*0.35;
      const co=new THREE.Mesh(new THREE.ConeGeometry(rad,ch,9),lm); co.position.y=y+ch*0.35; grp.add(co); y+=ch*0.55; } return grp; }
  for(let i=0;i<28;i++){ const t=pine(); const a=Math.random()*Math.PI*2, r=8+Math.random()*75;
    t.position.set(Math.cos(a)*r,0,Math.sin(a)*r); t.scale.setScalar(0.8+Math.random()*1.1); t.rotation.y=Math.random()*Math.PI; s.add(t); }
  const bMat=new THREE.MeshStandardMaterial({color:0x38784a,roughness:1});
  for(let i=0;i<20;i++){ const b=new THREE.Mesh(new THREE.IcosahedronGeometry(0.8+Math.random()*1.1,0),bMat);
    const a=Math.random()*Math.PI*2, r=6+Math.random()*70; b.position.set(Math.cos(a)*r,0.4,Math.sin(a)*r); b.scale.y=0.6; s.add(b); }

  s.add(new THREE.HemisphereLight(0xcdeecf, 0x1c3a2a, 1.1));
  const sun=new THREE.DirectionalLight(0xdfffe0,1.4); sun.position.set(40,70,20); s.add(sun);

  const N=180, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const a=Math.random()*Math.PI*2, r=5+Math.random()*70; pos[i*3]=Math.cos(a)*r; pos[i*3+1]=0.5+Math.random()*6; pos[i*3+2]=Math.sin(a)*r; }
  const pg=new THREE.BufferGeometry(); pg.setAttribute('position',new THREE.BufferAttribute(pos,3));
  s.add(new THREE.Points(pg, new THREE.PointsMaterial({color:0xbfffa0,size:0.3,transparent:true,opacity:0.75,depthWrite:false,blending:THREE.AdditiveBlending})));
  return s;
}

// ---- interior grid room: mesh walls with a grid texture + a centrepiece ----
function makeGridTexture(lineHex, bgHex, bright=1){
  const N=256; const cv=document.createElement('canvas'); cv.width=cv.height=N;
  const x=cv.getContext('2d');
  const bg=new THREE.Color(bgHex).multiplyScalar(bright);
  x.fillStyle='#'+bg.getHexString(); x.fillRect(0,0,N,N);
  x.strokeStyle='#'+new THREE.Color(lineHex).getHexString(); x.lineWidth=3.5; x.strokeRect(0,0,N,N);  // bold, readable lines
  const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=8; return t;
}
// boids flocking — each bird is a tiny red arrow pointing along its velocity (smoothed)
function createFlock(count, o){
  const {cx,cy,cz,r,yMin,yMax,size,color}=o; const speed=o.speed||3, avoidR=o.avoidR||0;
  const P=[],V=[],HD=[];
  for(let i=0;i<count;i++){
    P.push(new THREE.Vector3(cx+(Math.random()-0.5)*r*1.4, yMin+Math.random()*(yMax-yMin), cz+(Math.random()-0.5)*r*1.4));
    const v=new THREE.Vector3(Math.random()-0.5,(Math.random()-0.5)*0.25,Math.random()-0.5).setLength(speed); V.push(v);
    HD.push(v.clone().normalize());
  }
  const geo=new THREE.ConeGeometry(size*0.5, size*2.2, 5); geo.rotateX(-Math.PI/2);   // apex -> -Z = motion dir
  const mesh=new THREE.InstancedMesh(geo, new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.5, roughness:0.5}), count); mesh.frustumCulled=false; mesh.castShadow=true;
  // vertical drop-line from each bird down to the ground (tracks the bird)
  const groundY = o.groundY!==undefined ? o.groundY : 0;
  const linePos=new Float32Array(count*6);
  const lineGeo=new THREE.BufferGeometry(); lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos,3));
  const lines=new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({color, transparent:true, opacity:0.5})); lines.frustumCulled=false;
  const group=new THREE.Group(); group.add(mesh, lines);
  const d=new THREE.Object3D(), ali=new THREE.Vector3(), coh=new THREE.Vector3(), sep=new THREE.Vector3(), acc=new THREE.Vector3(), tmp=new THREE.Vector3();
  const perc=Math.max(size*20,2.6), sepD=Math.max(size*9,1.3);
  function step(dt){
    dt=Math.min(dt,0.04);
    const maxS=o.speed||3, minS=maxS*0.8, maxF=maxS*1.2, avoidR=o.avoidR||0;   // live-tunable
    for(let i=0;i<count;i++){
      const pi=P[i], vi=V[i]; ali.set(0,0,0); coh.set(0,0,0); sep.set(0,0,0); let n=0,ns=0;
      for(let j=0;j<count;j++){ if(i===j) continue; const pj=P[j];
        const dx=pi.x-pj.x,dy=pi.y-pj.y,dz=pi.z-pj.z, dd=Math.hypot(dx,dy,dz);
        if(dd<perc){ ali.add(V[j]); coh.add(pj); n++;
          if(dd<sepD&&dd>1e-4){ const wgt=(sepD-dd)/dd; sep.x+=dx*wgt; sep.y+=dy*wgt; sep.z+=dz*wgt; ns++; } } }
      acc.set(0,0,0);
      if(n>0){ ali.multiplyScalar(1/n).setLength(maxS).sub(vi).clampLength(0,maxF); acc.addScaledVector(ali,0.7);
               coh.multiplyScalar(1/n).sub(pi).setLength(maxS).sub(vi).clampLength(0,maxF); acc.addScaledVector(coh,0.45); }
      if(ns>0){ sep.setLength(maxS).sub(vi).clampLength(0,maxF*1.6); acc.addScaledVector(sep,1.1); }
      const hr=Math.hypot(pi.x-cx,pi.z-cz);
      if(hr>r){ acc.x+=(cx-pi.x)/hr*maxF; acc.z+=(cz-pi.z)/hr*maxF; }
      if(pi.y<yMin) acc.y+=maxF; if(pi.y>yMax) acc.y-=maxF;
      if(avoidR>0 && hr<avoidR){ acc.x+=(pi.x-cx)/(hr||1)*maxF*1.5; acc.z+=(pi.z-cz)/(hr||1)*maxF*1.5; }
      vi.addScaledVector(acc, dt);
      const sp=vi.length(); if(sp>maxS) vi.multiplyScalar(maxS/sp); else if(sp<minS&&sp>0) vi.multiplyScalar(minS/sp);
      pi.addScaledVector(vi, dt);
      // smoothed heading — arrow eases toward flight direction (no per-frame jitter)
      tmp.copy(vi).normalize(); HD[i].lerp(tmp, 1-Math.exp(-dt*5)).normalize();
      d.position.copy(pi); d.lookAt(pi.x+HD[i].x, pi.y+HD[i].y, pi.z+HD[i].z); d.updateMatrix(); mesh.setMatrixAt(i, d.matrix);
      const b=i*6; linePos[b]=pi.x; linePos[b+1]=pi.y; linePos[b+2]=pi.z; linePos[b+3]=pi.x; linePos[b+4]=groundY; linePos[b+5]=pi.z;
    }
    mesh.instanceMatrix.needsUpdate=true;
    lineGeo.attributes.position.needsUpdate=true;
  }
  step(0.016);
  return { object: group, update: step, opts:o, mesh, lines };
}
function makeCactus(){
  const g=new THREE.Group(); const m=new THREE.MeshStandardMaterial({color:0x3f8a4f, roughness:0.85});
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.38,0.46,3.0,14),m); trunk.position.y=1.5; g.add(trunk);
  for(const d of [1,-1]){
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.22,1.3,12),m); arm.position.set(d*0.55,1.55,0); arm.rotation.z=d*0.95; g.add(arm);
    const up=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.22,1.1,12),m); up.position.set(d*0.95,2.25,0); g.add(up);
  }
  const fl=new THREE.Mesh(new THREE.SphereGeometry(0.2,12,12), new THREE.MeshStandardMaterial({color:0xff6f9f, emissive:0x662233, emissiveIntensity:0.5})); fl.position.y=3.1; g.add(fl);
  return g;
}
function makeTree(){   // lush, moist-looking leafy tree
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.42,2.4,14), new THREE.MeshStandardMaterial({color:0x5b3d22,roughness:1})); trunk.position.y=1.2; g.add(trunk);
  const leaf=new THREE.MeshStandardMaterial({color:0x33ab5f, roughness:0.6});
  const blobs=[[0,2.7,0,1.4],[0.9,3.0,0.2,1.05],[-0.8,2.9,-0.2,1.0],[0.2,3.7,0,0.95],[-0.3,3.4,0.6,0.85]];
  for(const b of blobs){ const s=new THREE.Mesh(new THREE.IcosahedronGeometry(b[3],1),leaf); s.position.set(b[0],b[1],b[2]); g.add(s); }
  return g;
}
function buildBoxRoom(zSign, gridLineHex, wallBgHex, makeCenter){
  const s=new THREE.Scene();
  s.fog=new THREE.FogExp2(new THREE.Color(wallBgHex).multiplyScalar(1.1).getHex(), 0.022);   // light depth cue, walls stay readable
  const zNear=zSign*(PD/2+0.02), D=16, RX=WIN_W/2, YB=WIN_Y-WIN_H/2, YT=WIN_Y+WIN_H/2;
  const zFar=zNear - zSign*D, zc=(zNear+zFar)/2, yc=(YB+YT)/2;
  const tex=makeGridTexture(gridLineHex, wallBgHex, 1.7);   // brighten — walls are unlit, must self-illuminate
  function wall(w,h,pos,rot){
    const t=tex.clone(); t.needsUpdate=true; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=8; t.repeat.set(Math.max(1,Math.round(w*1.7)),Math.max(1,Math.round(h*1.7)));
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshBasicMaterial({map:t, side:THREE.DoubleSide}));
    mesh.position.copy(pos); if(rot) mesh.rotation.copy(rot); s.add(mesh);
  }
  wall(RX*2, YT-YB, new THREE.Vector3(0,yc,zFar), null);                          // back
  wall(RX*2, D,     new THREE.Vector3(0,YB,zc), new THREE.Euler(-Math.PI/2,0,0)); // floor
  wall(RX*2, D,     new THREE.Vector3(0,YT,zc), new THREE.Euler(Math.PI/2,0,0));  // ceiling
  wall(D, YT-YB,    new THREE.Vector3(-RX,yc,zc), new THREE.Euler(0,Math.PI/2,0));// left
  wall(D, YT-YB,    new THREE.Vector3(RX,yc,zc), new THREE.Euler(0,-Math.PI/2,0));// right
  const obj=makeCenter(); obj.position.set(0,YB,zc); s.add(obj);
  s.add(new THREE.HemisphereLight(0xffffff,0x334033,2.6));
  const pl=new THREE.PointLight(0xffffff,42,44); pl.position.set(0,YT-0.6, zc+zSign*2.2); s.add(pl);
  const flock=createFlock(16,{cx:0,cy:(YB+YT)/2,cz:zc, r:RX*0.75, yMin:0.5, yMax:YT-0.4, size:0.05, color:0xff3838, speed:1.2, groundY:YB});
  s.add(flock.object); s.userData.flock=flock;
  s.userData.center={ pos:new THREE.Vector3(0,YB,zc), placeholder:obj, h:(YT-YB) };
  return s;
}

// a REAL, walkable copy of the room — added straight into the main scene, tucked far away
// (same local layout as buildBoxRoom so the two look identical; only used for physical walk-through)
function buildWalkableRoom(zSign, gridLineHex, wallBgHex, makeCenter, worldOffset){
  const grp=new THREE.Group(); grp.position.copy(worldOffset); scene.add(grp);
  const zNear=zSign*(PD/2+0.02), D=16, RX=WIN_W/2, YB=WIN_Y-WIN_H/2, YT=WIN_Y+WIN_H/2;
  const zFar=zNear - zSign*D, zc=(zNear+zFar)/2, yc=(YB+YT)/2;
  const tex=makeGridTexture(gridLineHex, wallBgHex, 1.7);
  function wall(w,h,pos,rot){
    const t=tex.clone(); t.needsUpdate=true; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=8; t.repeat.set(Math.max(1,Math.round(w*1.7)),Math.max(1,Math.round(h*1.7)));
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshBasicMaterial({map:t, side:THREE.DoubleSide}));
    mesh.position.copy(pos); if(rot) mesh.rotation.copy(rot); grp.add(mesh);
  }
  wall(RX*2, YT-YB, new THREE.Vector3(0,yc,zFar), null);                          // back
  wall(RX*2, D,     new THREE.Vector3(0,YB,zc), new THREE.Euler(-Math.PI/2,0,0)); // floor
  wall(RX*2, D,     new THREE.Vector3(0,YT,zc), new THREE.Euler(Math.PI/2,0,0));  // ceiling
  wall(D, YT-YB,    new THREE.Vector3(-RX,yc,zc), new THREE.Euler(0,Math.PI/2,0));// left
  wall(D, YT-YB,    new THREE.Vector3(RX,yc,zc), new THREE.Euler(0,-Math.PI/2,0));// right
  const obj=makeCenter(); obj.position.set(0,YB,zc); grp.add(obj);
  const hemi=new THREE.HemisphereLight(0xffffff,0x334033,2.6); grp.add(hemi);
  const pl=new THREE.PointLight(0xffffff,42,44); pl.position.set(0,YT-0.6, zc+zSign*2.2); grp.add(pl);
  const flock=createFlock(16,{cx:0,cy:(YB+YT)/2,cz:zc, r:RX*0.75, yMin:0.5, yMax:YT-0.4, size:0.05, color:0xff3838, speed:1.2, groundY:YB});
  grp.add(flock.object);   // flock positions are room-local; grp's own position provides the world offset
  grp.userData.center={ pos:new THREE.Vector3(0,YB,zc), placeholder:obj, h:(YT-YB) };
  grp.userData.zSign=zSign; grp.userData.RX=RX; grp.userData.zNear=zNear; grp.userData.zFar=zFar; grp.userData.YB=YB; grp.userData.YT=YT;

}

    vertexShader: `varying vec3 vW,vN;
      void main(){ vec4 wp=modelMatrix*vec4(position,1.0); vW=wp.xyz; vN=normalize(mat3(modelMatrix)*normal);

    fragmentShader: `precision highp float; varying vec3 vW,vN;
      uniform sampler2D uTex; uniform vec2 uRes; uniform vec3 uCamPos,uTint; uniform float uBoost;
      void main(){ vec2 uv=gl_FragCoord.xy/uRes; vec3 world=texture2D(uTex,uv).rgb*uBoost;

  });
}

const smokeMat=new THREE.ShaderMaterial({
  transparent:true, depthWrite:false, blending:THREE.NormalBlending,
  uniforms:{ uTime:{value:0}, uCycle:{value:22.0}, uRise:{value:26.0}, uSway:{value:3.2},
             uSize:{value:340.0}, uColor:{value:new THREE.Color(0x9aa6b4)}, uOpacity:{value:0.55} },
  vertexShader:`attribute float aSeed; varying float vLife; varying float vSeed;
    uniform float uTime,uCycle,uRise,uSway,uSize;
    void main(){
      vSeed=aSeed;
      float t=uTime+aSeed*uCycle; float life=fract(t/uCycle); vLife=life;
      vec3 p=position;
      p.y += life*uRise;
      p.x += sin(t*0.35+aSeed*6.283)*uSway*(0.3+life);

      float fade=smoothstep(0.0,0.14,vLife)*smoothstep(1.0,0.62,vLife);   // fade in near ground, out near top
      float flick=0.75+0.25*hash(vSeed+floor(vLife*9.0));
      float a=soft*fade*flick*uOpacity;

});

// ---------------------------------------------------------------------------
// walking + soft collision against the pillar and an outer boundary
// ---------------------------------------------------------------------------
const HX=PW/2+0.6, HZ=PD/2+FRAME_D+0.4, BOUND=90;   // keep clear of the protruding frame
const DOOR_HALF_W = WIN_W/2 - 0.5;                  // walk-through opening, inset from the frame bars

let playerZone = 'courtyard';   // 'courtyard' | 'tree' | 'cactus'
function teleportEnter(zone){
  playerZone = zone;
  const room = zone==='tree' ? treeWalk : cactusWalk;
  const off  = zone==='tree' ? TREE_POCKET : CACTUS_POCKET;
  const { RX, zNear, zFar, zSign } = room.userData;
  const p = camera.position;
  const lx = THREE.MathUtils.clamp(p.x, -(RX-1.2), RX-1.2);
  const spawnZ = zNear - zSign*1.6;                 // just inside the entrance, heading further in
  p.set(off.x+lx, EYE, off.z+spawnZ);
  camera.lookAt(off.x+lx, EYE, off.z+zFar);         // face deeper into the room
}
function teleportExit(zone){
  const room = zone==='tree' ? treeWalk : cactusWalk;
  const off  = zone==='tree' ? TREE_POCKET : CACTUS_POCKET;
  const lx = THREE.MathUtils.clamp(camera.position.x-off.x, -(DOOR_HALF_W-0.5), DOOR_HALF_W-0.5);
  const zSign = room.userData.zSign;
  const p = camera.position;
  playerZone = 'courtyard';
  p.set(lx, EYE, zSign*(HZ+1.2));
  camera.lookAt(lx, 4, 0);                          // face back toward the monolith
}
function moveAndCollide(dt){
  const run = key['ShiftLeft']||key['ShiftRight'] ? 1.9 : 1.0;
  const speed = 6.0*run*dt;
  const f=(key['KeyW']||key['ArrowUp']?1:0)-(key['KeyS']||key['ArrowDown']?1:0);
  const r=(key['KeyD']||key['ArrowRight']?1:0)-(key['KeyA']||key['ArrowLeft']?1:0);
  if(f) controls.moveForward(f*speed);
  if(r) controls.moveRight(r*speed);
  const p=camera.position;

  if (playerZone==='courtyard') {
    const inDoor = Math.abs(p.x) < DOOR_HALF_W;
    if (Math.abs(p.x)<HX && Math.abs(p.z)<HZ && !inDoor) {   // solid slab / frame sides — push out
      if (HX-Math.abs(p.x) < HZ-Math.abs(p.z)) p.x=(p.x>=0?1:-1)*HX; else p.z=(p.z>=0?1:-1)*HZ;
    } else if (inDoor) {
      if (p.z>0 && p.z<=HZ) { teleportEnter('tree');   p.y=EYE; return; }
      if (p.z<0 && p.z>=-HZ){ teleportEnter('cactus'); p.y=EYE; return; }
    }
  } else {
    const room = playerZone==='tree' ? treeWalk : cactusWalk;
    const off  = playerZone==='tree' ? TREE_POCKET : CACTUS_POCKET;
    const { RX, zNear, zFar, zSign } = room.userData;
    const lx=p.x-off.x, lz=p.z-off.z;
    const marginX=RX-0.6; if(lx>marginX) p.x=off.x+marginX; if(lx<-marginX) p.x=off.x-marginX;
    const zLo=Math.min(zNear,zFar)+0.6, zHi=Math.max(zNear,zFar)+2.0;
    if(lz<zLo) p.z=off.z+zLo; if(lz>zHi) p.z=off.z+zHi;
    const exitThresh = zNear - zSign*1.0;
    const atExit = zSign>0 ? lz>=exitThresh : lz<=exitThresh;
    if (atExit) { teleportExit(playerZone); p.y=EYE; return; }
    p.y=EYE; return;
  }
  const rad=Math.hypot(p.x,p.z); if(rad>BOUND){ p.x*=BOUND/rad; p.z*=BOUND/rad; }
  p.y=EYE;
}

// ---------------------------------------------------------------------------
// render + loop
// ---------------------------------------------------------------------------
// ---- scene render target with depth (for the volumetric raymarch) ----
const _db=new THREE.Vector2(); renderer.getDrawingBufferSize(_db);
const depthTexture = new THREE.DepthTexture(_db.x, _db.y); depthTexture.type = THREE.UnsignedIntType;
const sceneRT = new THREE.WebGLRenderTarget(_db.x, _db.y, { type: THREE.HalfFloatType, depthTexture });
const dummyShadow = new THREE.DataTexture(new Uint8Array([255,255,255,255]),1,1,THREE.RGBAFormat); dummyShadow.needsUpdate=true;
const sunDir = sun.position.clone().normalize();

// ---- volumetric fog: raymarch camera->scene, sun in-scatter + shadow-map god rays ----
const volMat = new THREE.ShaderMaterial({
  uniforms:{
    tDiffuse:{value:null}, tDepth:{value:depthTexture},
    uInvProj:{value:new THREE.Matrix4()}, uInvView:{value:new THREE.Matrix4()}, uCamPos:{value:new THREE.Vector3()},
    uTime:{value:0}, uSunDir:{value:sunDir}, uSunColor:{value:new THREE.Color(0x000000)}, uFogColor:{value:new THREE.Color(0x7a8590)},
    uDensity:{value:0.008}, uHeight:{value:0.04}, uMaxDist:{value:50.0}, uSteps:{value:48.0},
    uSunStr:{value:5.0}, uAmb:{value:1.0},
    uShadowMatrix:{value:new THREE.Matrix4()}, uShadowMap:{value:dummyShadow},
  },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`precision highp float; varying vec2 vUv;
    uniform sampler2D tDiffuse, tDepth, uShadowMap;
    uniform mat4 uInvProj, uInvView, uShadowMatrix;
    uniform vec3 uCamPos, uSunDir, uSunColor, uFogColor;
    uniform float uTime, uDensity, uHeight, uMaxDist, uSteps, uSunStr, uAmb;
    float hash(vec3 p){ p=fract(p*0.3183099+0.1); p*=17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
    float vn(vec3 x){ vec3 i=floor(x), f=fract(x); f=f*f*(3.0-2.0*f);
      return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x), mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x), mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y), f.z); }
    float fbm(vec3 p){ float s=0.0,a=0.5; for(int i=0;i<3;i++){ s+=a*vn(p); p*=2.0; a*=0.5; } return s; }
    float shadowAt(vec3 wp){ vec4 sc=uShadowMatrix*vec4(wp,1.0); if(sc.w<=0.0) return 1.0; sc.xyz/=sc.w;
      if(sc.x<0.0||sc.x>1.0||sc.y<0.0||sc.y>1.0||sc.z>1.0) return 1.0;
      float d=texture2D(uShadowMap, sc.xy).r; return (sc.z-0.0016 > d) ? 0.0 : 1.0; }
    void main(){
      vec3 col=texture2D(tDiffuse,vUv).rgb;
      float depth=texture2D(tDepth,vUv).r;
      vec4 ndc=vec4(vUv*2.0-1.0, depth*2.0-1.0, 1.0);
      vec4 vp=uInvProj*ndc; vp/=vp.w;
      vec3 worldPos=(uInvView*vec4(vp.xyz,1.0)).xyz;
      vec3 rd=worldPos-uCamPos; float dist=length(rd); rd/=max(dist,1e-4);
      bool sky = depth>=0.99999;
      float march = sky ? uMaxDist : min(dist, uMaxDist);
      int N=int(uSteps); float stepLen=march/float(N);
      float t=stepLen*hash(vec3(gl_FragCoord.xy, uTime));       // jitter start
      float g=0.55, cosA=dot(rd,uSunDir);
      float phase=(1.0-g*g)/(12.566*pow(max(1.0+g*g-2.0*g*cosA,1e-3),1.5));
      float trans=1.0; vec3 scat=vec3(0.0);
      for(int i=0;i<48;i++){ if(i>=N||trans<0.02) break;
        vec3 p=uCamPos+rd*t;
        float dens=uDensity*exp(-max(p.y,0.0)*uHeight);
        dens*= (0.35+0.65*fbm(p*0.12+vec3(0.0,uTime*0.04,uTime*0.02)));
        dens=max(dens,0.0)*stepLen;
        if(dens>0.0){ float sh=shadowAt(p);
          vec3 inScat = uSunColor*phase*sh*uSunStr + uFogColor*uAmb;
          scat+=trans*inScat*dens; trans*=exp(-dens); }
        t+=stepLen;
      }
      gl_FragColor=vec4(col*trans+scat, 1.0);
    }`,
});

// ---- composer: SSAO(own scene render) -> volumetric -> DoF -> bloom -> tonemap -> grade -> vignette ----
const composer = new EffectComposer(renderer);
const ssaoPass = new SSAOPass(scene, camera, _db.x, _db.y);
ssaoPass.kernelRadius = 6;
ssaoPass.minDistance = 0.003;
ssaoPass.maxDistance = 0.15;
composer.addPass(ssaoPass);
composer.addPass(new ShaderPass(volMat, 'tDiffuse'));

// ---- cinematic depth of field — reuses the scene's depth texture, no extra scene render ----
const dofPass = new ShaderPass({
  uniforms:{ tDiffuse:{value:null}, tDepth:{value:depthTexture}, uRes:{value:new THREE.Vector2(_db.x,_db.y)},
             uNear:{value:camera.near}, uFar:{value:camera.far},
             uFocusDist:{value:20.0}, uFocusRange:{value:10.0}, uBokeh:{value:1.0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`precision highp float; varying vec2 vUv;
    uniform sampler2D tDiffuse, tDepth; uniform vec2 uRes;
    uniform float uNear,uFar,uFocusDist,uFocusRange,uBokeh;
    float lin(float d){ float z=d*2.0-1.0; return (2.0*uNear*uFar)/(uFar+uNear - z*(uFar-uNear)); }
    void main(){
      float d0=lin(texture2D(tDepth,vUv).r);
      float coc=clamp(abs(d0-uFocusDist)/max(uFocusRange,0.001), 0.0, 1.0);
      coc=smoothstep(0.0,1.0,coc)*uBokeh;
      if(coc<0.004){ gl_FragColor=texture2D(tDiffuse,vUv); return; }
      vec2 px=coc*3.2/uRes;
      vec3 sum=vec3(0.0); float wsum=0.0;
      const int N=12;
      vec2 taps[12];
      taps[0]=vec2(0.0,1.0); taps[1]=vec2(0.87,0.5); taps[2]=vec2(0.87,-0.5); taps[3]=vec2(0.0,-1.0);
      taps[4]=vec2(-0.87,-0.5); taps[5]=vec2(-0.87,0.5); taps[6]=vec2(0.0,0.5); taps[7]=vec2(0.43,0.25);
      taps[8]=vec2(0.43,-0.25); taps[9]=vec2(0.0,-0.5); taps[10]=vec2(-0.43,-0.25); taps[11]=vec2(-0.43,0.25);
      for(int i=0;i<N;i++){ sum+=texture2D(tDiffuse, vUv+taps[i]*px).rgb; wsum+=1.0; }
      sum/=wsum;
      vec3 sharp=texture2D(tDiffuse,vUv).rgb;
      gl_FragColor=vec4(mix(sharp, sum, coc), 1.0);
    }`,
});
composer.addPass(dofPass);

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.21, 0.45, 0.72);   // higher threshold: glow only true highlights, not the whole dim scene

// ---- sketch / engraving NPR: hatching + depth edges + film grain ----
const sketchPass = new ShaderPass({
  uniforms:{ tDiffuse:{value:null}, tDepth:{value:depthTexture}, uRes:{value:new THREE.Vector2(_db.x,_db.y)},
             uNear:{value:camera.near}, uFar:{value:camera.far}, uTime:{value:0},
             uInk:{value:0.19}, uEdge:{value:1.67}, uGrain:{value:0.06}, uColor:{value:1.0}, uFreq:{value:2.21} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`precision highp float; varying vec2 vUv;
    uniform sampler2D tDiffuse, tDepth; uniform vec2 uRes;
    uniform float uNear,uFar,uTime,uInk,uEdge,uGrain,uColor,uFreq;
    float luma(vec3 c){ return dot(c, vec3(0.299,0.587,0.114)); }
    float lin(float d){ float z=d*2.0-1.0; return (2.0*uNear*uFar)/(uFar+uNear - z*(uFar-uNear)); }
    float rnd(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      vec3 col=texture2D(tDiffuse,vUv).rgb;
      float L=luma(col);
      vec2 fc=vUv*uRes;
      float wob=(rnd(floor(fc/vec2(2.0,7.0)))-0.5)*2.2;          // hand-drawn wobble
      float cov=clamp(1.0-L,0.0,1.0);
      float p1=0.5+0.5*sin((fc.y+wob)*uFreq);                    // horizontal engraving
      float ink=1.0-smoothstep(cov-0.06, cov+0.06, p1);
      float p2=0.5+0.5*sin((fc.x+fc.y+wob)*uFreq*0.8);           // cross-hatch in shadows
      ink=max(ink, (1.0-smoothstep(cov-0.06,cov+0.06,p2))*smoothstep(0.45,0.7,cov));
      vec2 tx=1.0/uRes;
      float d0=lin(texture2D(tDepth,vUv).r);
      float e = abs(lin(texture2D(tDepth,vUv+vec2(tx.x,0.)).r)-d0)+abs(lin(texture2D(tDepth,vUv+vec2(-tx.x,0.)).r)-d0)
              + abs(lin(texture2D(tDepth,vUv+vec2(0.,tx.y)).r)-d0)+abs(lin(texture2D(tDepth,vUv+vec2(0.,-tx.y)).r)-d0);
      float edge=smoothstep(0.05,0.25, e/max(d0,1.0))*uEdge;
      ink=max(ink, edge);
      float g=(rnd(fc+floor(uTime*24.0))-0.5)*uGrain*(0.3+0.9*ink);   // grain rides on ink, stays clean elsewhere
      float darkAmt=ink*clamp(uInk*2.4,0.0,1.0);                      // wider, actually-visible tonal range
      float tone=clamp(0.98-darkAmt+g, 0.0, 1.0);
      float mx=max(max(col.r,col.g),col.b), mn=min(min(col.r,col.g),col.b), sat=mx-mn;
      vec3 outc=mix(vec3(tone), col*(tone/max(L,0.001)), clamp(sat*L*4.0*uColor,0.0,0.65));
      gl_FragColor=vec4(outc,1.0);
    }`,
});
sketchPass.enabled = false;   // off by default — toggle via GUI
composer.addPass(sketchPass);

const vignettePass = new ShaderPass({
  uniforms:{ tDiffuse:{value:null}, darkness:{value:0.76},
             uAberration:{value:2.2}, uGrade:{value:0.55}, uContrast:{value:0.12} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`uniform sampler2D tDiffuse; uniform float darkness,uAberration,uGrade,uContrast; varying vec2 vUv;
    void main(){
      vec2 ctr=vUv-0.5; float d=length(ctr);
      // chromatic aberration — RGB channels sampled with radial offset, strongest at the rim
      vec2 off=ctr*(d*d)*uAberration*0.003;
      float r=texture2D(tDiffuse,vUv-off).r;
      float g=texture2D(tDiffuse,vUv).g;
      float b=texture2D(tDiffuse,vUv+off).b;
      vec3 c=vec3(r,g,b);
      // filmic S-curve contrast
      c=mix(c, smoothstep(0.0,1.0,c), uContrast);
      // teal-shadow / warm-highlight cinematic split-tone
      float L=dot(c,vec3(0.299,0.587,0.114));
      vec3 shadowTint=vec3(0.0,0.06,0.09), highTint=vec3(0.09,0.045,0.0);
      c += shadowTint*(1.0-smoothstep(0.0,0.5,L))*uGrade;
      c += highTint*smoothstep(0.5,1.0,L)*uGrade;
      float vig=smoothstep(0.85,0.32,d); c*=mix(1.0,vig,darkness);
      gl_FragColor=vec4(c,1.0);
    }`,
});
composer.addPass(vignettePass);

let elapsed=0;
function renderFrame(dt=0.016){
  updateAmbient();
  uCamPos.value.copy(camera.position);
  mainFlock.update(dt);
  treeRoom.userData.flock.update(dt);
  cactusRoom.userData.flock.update(dt);
  for(let i=0;i<flapUniforms.length;i++) flapUniforms[i].uFlapTime.value=elapsed;
  renderer.setRenderTarget(forestRT); renderer.render(treeRoom, camera);
  renderer.setRenderTarget(desertRT); renderer.render(cactusRoom, camera);
  renderer.setRenderTarget(sceneRT);  renderer.render(scene, camera);   // color + depth (+ shadow map)
  camera.updateMatrixWorld();
  volMat.uniforms.uInvProj.value.copy(camera.projectionMatrixInverse);
  volMat.uniforms.uInvView.value.copy(camera.matrixWorld);
  volMat.uniforms.uCamPos.value.copy(camera.position);
  volMat.uniforms.uTime.value = elapsed;
  if(sun.shadow.map){ volMat.uniforms.uShadowMap.value = sun.shadow.map.texture; volMat.uniforms.uShadowMatrix.value.copy(sun.shadow.matrix); }
  sketchPass.uniforms.uTime.value = elapsed;
  smokeMat.uniforms.uTime.value = elapsed;
  renderer.setRenderTarget(null);     composer.render();      // volumetric + cinematic composite
}
window.__viz = { renderFrame, camera, controls, paused:false, scene, setElapsed:v=>{elapsed=v;}, dofPass, sketchPass, ssaoPass,
  teleportEnter, teleportExit, getZone:()=>playerZone, moveAndCollide, treeWalk, cactusWalk, TREE_POCKET, CACTUS_POCKET };
const clock=new THREE.Clock();
function animate(){
  if(window.__viz.paused) return;
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05); elapsed+=dt;
  if(controls.isLocked) moveAndCollide(dt);
  renderFrame(dt);
}

const fbxL = new FBXLoader();

// merge an fbx's meshes into one static BufferGeometry (bind pose)
function fbxGeometry(root){
  root.updateMatrixWorld(true);
  const geos=[];
  root.traverse(n=>{ if(n.isMesh){ const g=n.geometry.clone();
    g.deleteAttribute('skinIndex'); g.deleteAttribute('skinWeight');
    for(const k of Object.keys(g.attributes)) if(!['position','normal','uv'].includes(k)) g.deleteAttribute(k);
    g.applyMatrix4(n.matrixWorld); geos.push(g); } });
  if(!geos.length) return null;
  return geos.length>1 ? BufferGeometryUtils.mergeGeometries(geos, false) : geos[0];
}

// BIRD -> flock arrows become real bird silhouettes (wings-out glide pose)
fbxL.load('bird_fbx.fbx', root=>{
  const base=fbxGeometry(root); if(!base) return;
  base.center(); base.rotateY(Math.PI);                 // face -Z = flight direction
  const span=base.boundingBox.getSize(new THREE.Vector3()).length()||1;
  base.scale(1/span,1/span,1/span);
  for(const f of [mainFlock, treeRoom.userData.flock, cactusRoom.userData.flock, treeWalk.userData.flock, cactusWalk.userData.flock]){
    const g=base.clone(); const k=(f.opts.size||0.13)*8; g.scale(k,k,k);
    g.computeBoundingBox(); const halfSpan=(g.boundingBox.max.x-g.boundingBox.min.x)*0.5 || k*0.4;
    f.mesh.geometry.dispose(); f.mesh.geometry=g; g.computeBoundingSphere();
    // GPU wing-flap injected into the standard material's vertex shader
    const u={ uFlapTime:{value:0}, uFlapAmp:{value:halfSpan*0.9}, uFlapSpeed:{value:flapCfg.speed}, uHalfSpan:{value:halfSpan}, uAmpF:{value:flapCfg.amp} };
    const mat=f.mesh.material; mat.userData.flap=u;
    mat.onBeforeCompile=(sh)=>{
      sh.uniforms.uFlapTime=u.uFlapTime; sh.uniforms.uFlapAmp=u.uFlapAmp; sh.uniforms.uFlapSpeed=u.uFlapSpeed; sh.uniforms.uHalfSpan=u.uHalfSpan; sh.uniforms.uAmpF=u.uAmpF;
      sh.vertexShader='uniform float uFlapTime,uFlapAmp,uFlapSpeed,uHalfSpan,uAmpF;\n'+sh.vertexShader.replace(
        '#include <begin_vertex>',
        '#include <begin_vertex>\n float _ph=float(gl_InstanceID)*1.7; float _wf=clamp(abs(transformed.x)/max(uHalfSpan,1e-4),0.0,1.0); transformed.y += sin(uFlapTime*uFlapSpeed+_ph)*pow(_wf,1.7)*uFlapAmp*uAmpF;');
    };
    mat.needsUpdate=true; flapUniforms.push(u);
  }
  // flap controls in the GUI (folder already exists)
  fBirds.add(flapCfg,'speed',0,20,0.1).name('flap speed').onChange(x=>flapUniforms.forEach(u=>u.uFlapSpeed.value=x));
  fBirds.add(flapCfg,'amp',0,2.5,0.01).name('flap amount').onChange(x=>flapUniforms.forEach(u=>u.uAmpF.value=x));
}, undefined, e=>console.warn('bird fbx failed', e));

// TREE / DEAD-TREE -> room centrepieces (auto-fit to room height, feet on floor)
// placed into every given room (the RT-only illusion room AND its real walkable twin)
function placeInRoom(name, roomScenes){
  fbxL.load(name, root=>{
    root.updateMatrixWorld(true);
    const rawBox=new THREE.Box3().setFromObject(root); const rawSz=rawBox.getSize(new THREE.Vector3());
    const scale=(roomScenes[0].userData.center.h*0.95)/Math.max(rawSz.y,1e-3);
    roomScenes.forEach((roomScene,i)=>{
      const inst = i===0 ? root : root.clone(true);
      inst.position.set(0,0,0);   // reset — a clone carries over the PREVIOUS iteration's offset otherwise
      const c=roomScene.userData.center;
      inst.scale.setScalar(scale);
      inst.updateMatrixWorld(true);
      const box=new THREE.Box3().setFromObject(inst); const ctr=box.getCenter(new THREE.Vector3());
      inst.position.set(c.pos.x-ctr.x, c.pos.y-box.min.y, c.pos.z-ctr.z);
      inst.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.receiveShadow=true; n.frustumCulled=false; } });
      roomScene.remove(c.placeholder); roomScene.add(inst);
    });
  }, undefined, e=>console.warn(name+' failed', e));
}
placeInRoom('Tree.fbx', [treeRoom, treeWalk]);
placeInRoom('die-tree.fbx', [cactusRoom, cactusWalk]);
